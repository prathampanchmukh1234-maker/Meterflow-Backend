services:
  - type: web
    name: meterflow-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: SERVE_FRONTEND
        value: "false"
      - key: REDIS_DISABLED
        value: "false"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: VITE_APP_URL
        sync: false
